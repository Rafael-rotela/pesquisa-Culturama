<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa culturama</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Pesquisa online</h1>
    </header>
    <section>
        <form action="" method="get">
                <fieldset>
                <legend>Dados pessoais</legend>
                <label for="Username">Nome</label>
                <input type="text" name="Username" required>
                
                <label for="birthDate">Ano de Nascimento</label>
                <input type="datetime-local" name="birthDate" required>
                
                <label for="userEmail">Email</label>
                <input type="email" name="userEmail" required>
    
                <label for="usertelefone">Telefone</label>
                <input type="number" name="usertelefone" pattern="[0-9]{11}" placeholder="DDD + número">
                
                <label for="UserImage">Upload de Foto</label>
                <input type="image" accept="image/*" name="UserImage">
            
                <button type="button">ENVIAR</button>
            </fieldset>
        </form>
    </section>
</body>
</html>
